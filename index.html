<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FERCO — Sistema de Auditorías 5S</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f1f5f9;--surface:#fff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;--soft:#f8fafc;
  --primary:#101820;--accent:#F0BE1A;--accent-dark:#c99a00;
  --good:#166534;--goodbg:#dcfce7;--mid:#92400e;--midbg:#fef3c7;
  --bad:#991b1b;--badbg:#fee2e2;--info:#1e40af;--infobg:#dbeafe;
  --pending:#6b21a8;--pendingbg:#f3e8ff;
  --closed:#166534;--closedbg:#dcfce7;
  --late:#991b1b;--latebg:#fee2e2;
  --inprog:#92400e;--inprogbg:#fef3c7;
}
body{font-family:Arial,sans-serif;font-size:14px;color:var(--text);background:var(--bg);min-height:100vh}

/* ── AUTH ── */
#authScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--primary)}
.auth-box{background:#fff;border-radius:20px;padding:40px 36px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.auth-logo-badge{background:var(--accent);color:var(--primary);font-size:22px;font-weight:900;padding:8px 14px;border-radius:10px;letter-spacing:1px}
.auth-logo-text{font-size:18px;font-weight:800;color:var(--primary)}
.auth-subtitle{font-size:13px;color:var(--muted);margin-bottom:24px}
.auth-box h2{font-size:20px;font-weight:800;margin-bottom:4px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary)}
.btn-primary{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s}
.btn-primary:hover{background:#1e2d3d}
.auth-err{color:#991b1b;font-size:13px;margin-top:10px;text-align:center;display:none}

/* ── LAYOUT ── */
#app{display:none;min-height:100vh}
.sidebar{position:fixed;top:0;left:0;width:220px;height:100vh;background:var(--primary);color:#fff;display:flex;flex-direction:column;z-index:100}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo .badge{background:var(--accent);color:var(--primary);font-size:12px;font-weight:900;padding:4px 8px;border-radius:6px;letter-spacing:1px}
.sidebar-logo .name{font-size:13px;font-weight:700;margin-top:8px;line-height:1.3}
.sidebar-logo .role-badge{display:inline-block;margin-top:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(240,190,26,.15);color:var(--accent);border:1px solid rgba(240,190,26,.3)}
.nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 18px;cursor:pointer;font-size:13px;font-weight:600;color:rgba(255,255,255,.7);border-left:3px solid transparent;transition:all .15s;position:relative}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:rgba(240,190,26,.12);color:var(--accent);border-left-color:var(--accent)}
.nav-item .notif-dot{background:#ef4444;color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.sidebar-footer{padding:16px 18px;border-top:1px solid rgba(255,255,255,.1)}
.user-info{display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--accent);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.user-meta{flex:1;min-width:0}
.user-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-email{font-size:10px;color:rgba(255,255,255,.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-logout{background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;font-size:12px;padding:4px;margin-top:6px;text-align:left;width:100%}
.btn-logout:hover{color:#fff}
.main{margin-left:220px;padding:24px;min-height:100vh}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.topbar h1{font-size:20px;font-weight:800}
.topbar p{font-size:13px;color:var(--muted);margin-top:2px}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:16px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px}
.kpi .lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.kpi .val{font-size:30px;font-weight:800;line-height:1}
.kpi .sub{font-size:11px;color:var(--muted);margin-top:4px}

/* ── STATUS PILLS ── */
.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.pill-pending{background:var(--pendingbg);color:var(--pending)}
.pill-inprog{background:var(--inprogbg);color:var(--inprog)}
.pill-closed{background:var(--closedbg);color:var(--closed)}
.pill-late{background:var(--latebg);color:var(--late)}

/* ── KANBAN ── */
.kanban-board{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start}
.kanban-col{background:var(--soft);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.kanban-col-header{padding:14px 16px;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.kanban-col-header .count{font-size:11px;font-weight:700;min-width:22px;height:22px;border-radius:11px;display:flex;align-items:center;justify-content:center;padding:0 6px}
.kanban-col[data-col="pending"] .kanban-col-header{background:#f3e8ff;color:var(--pending)}
.kanban-col[data-col="pending"] .count{background:var(--pending);color:#fff}
.kanban-col[data-col="inprog"] .kanban-col-header{background:var(--midbg);color:var(--inprog)}
.kanban-col[data-col="inprog"] .count{background:var(--inprog);color:#fff}
.kanban-col[data-col="closed"] .kanban-col-header{background:var(--goodbg);color:var(--closed)}
.kanban-col[data-col="closed"] .count{background:var(--closed);color:#fff}
.kanban-col[data-col="late"] .kanban-col-header{background:var(--badbg);color:var(--late)}
.kanban-col[data-col="late"] .count{background:var(--late);color:#fff}
.kanban-items{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:80px}
.kanban-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:border-color .15s,transform .1s}
.kanban-card:hover{border-color:#0f172a;transform:translateY(-1px)}
.kanban-card .kc-id{font-size:10px;color:var(--muted);font-weight:700;margin-bottom:4px}
.kanban-card .kc-area{font-size:13px;font-weight:700;margin-bottom:2px}
.kanban-card .kc-auditor{font-size:11px;color:var(--muted);margin-bottom:8px}
.kanban-card .kc-meta{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px}
.kanban-card .kc-date{font-size:10px;color:var(--muted)}
.kanban-card.late-card{border-left:3px solid var(--late)}
.kanban-empty{padding:20px;text-align:center;font-size:12px;color:var(--muted)}

/* ── BUTTONS ── */
.btn{padding:9px 16px;border-radius:12px;border:1px solid var(--border);background:var(--surface);font-weight:700;font-size:13px;color:var(--text);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--primary);background:var(--soft)}
.btn-accent{background:var(--accent);color:var(--primary);border-color:var(--accent)}
.btn-accent:hover{background:var(--accent-dark);border-color:var(--accent-dark)}
.btn-dark{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-dark:hover{background:#1e2d3d;border-color:#1e2d3d}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
.btn-danger{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.btn-danger:hover{background:#fca5a5}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:20px;width:100%;max-width:860px;margin:auto;overflow:hidden}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1}
.modal-header h2{font-size:16px;font-weight:800}
.modal-body{padding:24px;max-height:80vh;overflow-y:auto}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--surface)}
.btn-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);line-height:1;padding:4px}

/* ── FORM / AUDIT ── */
.audit-header-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.section-header{background:var(--primary);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:800;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.section-header .section-score{font-size:11px;background:rgba(240,190,26,.2);color:var(--accent);padding:2px 8px;border-radius:10px}
.criteria-table{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:13px}
.criteria-table th{background:var(--soft);padding:9px 12px;border-bottom:2px solid var(--border);text-align:left;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.criteria-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top}
.criteria-table tr:hover td{background:#fafafa}
.criteria-num{width:36px;color:var(--muted);font-weight:700}
.criteria-desc{font-weight:600;line-height:1.4}
.yn-group{display:flex;gap:8px;align-items:center}
.yn-btn{padding:5px 14px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.yn-btn.yes-active{background:#dcfce7;border-color:#166534;color:#166534}
.yn-btn.no-active{background:#fee2e2;border-color:#991b1b;color:#991b1b}
.yn-btn:hover{border-color:var(--primary)}
.hallazgo-col{min-width:160px}
.hallazgo-col textarea{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:8px;font-size:12px;resize:vertical;min-height:48px;outline:none}
.hallazgo-col textarea:focus{border-color:var(--primary)}
.evidencia-col{min-width:120px}
.evidencia-upload{display:flex;flex-direction:column;gap:4px}
.evidencia-upload input[type=file]{display:none}
.evidencia-label{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border:1px dashed var(--border);border-radius:8px;font-size:11px;color:var(--muted);cursor:pointer;transition:all .15s}
.evidencia-label:hover{border-color:var(--primary);color:var(--primary)}
.evidencia-thumbs{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.evidencia-thumbs img{width:40px;height:40px;object-fit:cover;border-radius:6px;border:1px solid var(--border);cursor:pointer}

/* ── SOLUTION (SUPERVISOR) ── */
.solucion-col{min-width:160px}
.solucion-col textarea{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:8px;font-size:12px;resize:vertical;min-height:48px;outline:none;background:#f0fdf4}
.solucion-col textarea:focus{border-color:#166534}

/* ── NOTIFICATIONS ── */
.notif-panel{position:fixed;top:0;right:0;width:340px;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:300;transform:translateX(100%);transition:transform .25s;display:flex;flex-direction:column}
.notif-panel.open{transform:translateX(0)}
.notif-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.notif-header h3{font-size:15px;font-weight:800}
.notif-list{flex:1;overflow-y:auto;padding:12px}
.notif-item{padding:12px;border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:background .15s}
.notif-item:hover{background:var(--soft)}
.notif-item.unread{border-left:3px solid var(--accent);background:rgba(240,190,26,.04)}
.notif-title{font-size:13px;font-weight:700;margin-bottom:2px}
.notif-body{font-size:12px;color:var(--muted);line-height:1.4}
.notif-time{font-size:10px;color:var(--muted);margin-top:4px}

/* ── DASHBOARD CHARTS ── */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px}
.chart-card h3{font-size:13px;font-weight:800;margin-bottom:14px;color:var(--text)}
.gauge-wrap{position:relative;width:100%;max-width:240px;margin:0 auto}
.gauge-label{text-align:center;margin-top:8px}
.gauge-pct{font-size:28px;font-weight:800}
.gauge-sub{font-size:11px;color:var(--muted)}

/* ── ADMIN USERS ── */
.users-table{width:100%;border-collapse:collapse;font-size:13px}
.users-table th{text-align:left;padding:10px 14px;border-bottom:2px solid var(--border);font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;background:var(--soft)}
.users-table td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.users-table tr:hover td{background:#fafafa}

/* ── SECTION TABS ── */
.page{display:none}.page.active{display:block}
.tabs-bar{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border)}
.tab-btn{padding:9px 18px;border-radius:10px 10px 0 0;border:1px solid transparent;border-bottom:none;color:var(--muted);cursor:pointer;background:transparent;font-size:13px;font-weight:700;margin-bottom:-1px;transition:all .15s}
.tab-btn.active{background:var(--surface);border-color:var(--border);color:var(--text)}

/* ── MISC ── */
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;background:var(--soft);border:1px solid var(--border)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:40px;color:var(--muted)}
.empty-state p{font-size:14px;margin-top:8px}
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:500;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--primary);color:#fff;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:600;animation:slideUp .3s ease;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.success{background:#166534}.toast.error{background:#991b1b}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}}
.progress-bar-wrap{background:var(--border);border-radius:4px;height:6px;margin-top:6px}
.progress-bar{background:var(--primary);border-radius:4px;height:6px;transition:width .3s}
.progress-bar.good{background:#166534}.progress-bar.mid{background:#ca8a04}.progress-bar.bad{background:#991b1b}
select,input[type=date],input[type=text],input[type=email]{padding:8px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;background:var(--surface);outline:none}
select:focus,input:focus{border-color:var(--primary)}
.filter-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
@media(max-width:900px){.kanban-board{grid-template-columns:1fr 1fr}.sidebar{width:200px}.main{margin-left:200px}.dash-grid{grid-template-columns:1fr}}
@media(max-width:640px){.kanban-board{grid-template-columns:1fr}.sidebar{display:none}.main{margin-left:0}.audit-header-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- ═══════════════════════ AUTH SCREEN ═══════════════════════ -->
<div id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-badge">5S</div>
      <div>
        <div class="auth-logo-text">FERCO Cerámica</div>
        <div style="font-size:11px;color:var(--muted)">Sistema de Auditorías</div>
      </div>
    </div>
    <h2>Iniciar sesión</h2>
    <p class="auth-subtitle">Ingresa con tu correo corporativo</p>
    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" id="authEmail" placeholder="usuario@ferco.com.gt">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="authPass" placeholder="••••••••">
    </div>
    <button class="btn-primary" onclick="doLogin()">Ingresar</button>
    <div class="auth-err" id="authErr"></div>
    <div style="text-align:center;margin-top:16px;font-size:12px;color:var(--muted)">
      ¿Nuevo usuario? Contacta al administrador.
    </div>
  </div>
</div>

<!-- ═══════════════════════ MAIN APP ═══════════════════════ -->
<div id="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="badge">5S</div>
        <div style="font-size:13px;font-weight:800">FERCO Auditorías</div>
      </div>
      <div class="name" id="sidebarUserName">—</div>
      <div class="role-badge" id="sidebarRoleBadge">—</div>
    </div>
    <nav class="nav" id="mainNav"></nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="avatar" id="sidebarAvatar">—</div>
        <div class="user-meta">
          <div class="user-name" id="sidebarEmail">—</div>
          <div class="user-email" id="sidebarRoleText">—</div>
        </div>
      </div>
      <button class="btn-logout" onclick="doLogout()">🚪 Cerrar sesión</button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">
    <!-- Topbar -->
    <div class="topbar">
      <div>
        <h1 id="pageTitle">Dashboard</h1>
        <p id="pageSubtitle">FERCO Cerámica — Sistema de Auditorías 5S</p>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <button class="btn btn-sm" onclick="toggleNotifPanel()" style="position:relative">
          🔔 Notificaciones
          <span class="notif-dot" id="notifBadge" style="display:none;position:absolute;top:-6px;right:-6px">0</span>
        </button>
      </div>
    </div>

    <!-- Pages -->
    <div id="pageKanban" class="page active"></div>
    <div id="pageFormulario" class="page"></div>
    <div id="pageDashboard" class="page"></div>
    <div id="pageUsuarios" class="page"></div>
  </div>
</div>

<!-- ═══════════════════════ NOTIFICATION PANEL ═══════════════════════ -->
<div class="notif-panel" id="notifPanel">
  <div class="notif-header">
    <h3>🔔 Notificaciones</h3>
    <button class="btn-close" onclick="toggleNotifPanel()">✕</button>
  </div>
  <div class="notif-list" id="notifList"><div class="empty-state"><p>Sin notificaciones</p></div></div>
</div>

<!-- ═══════════════════════ AUDIT MODAL ═══════════════════════ -->
<div class="modal-overlay" id="auditModal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <h2 id="auditModalTitle">Auditoría 5S</h2>
        <div id="auditModalMeta" style="font-size:11px;color:var(--muted);margin-top:2px"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="auditModalStatus"></span>
        <button class="btn-close" onclick="closeAuditModal()">✕</button>
      </div>
    </div>
    <div class="modal-body" id="auditModalBody"></div>
    <div class="modal-footer" id="auditModalFooter"></div>
  </div>
</div>

// ═══════════════════════════════════════════════════

// ═══════════════════════════════════════════════════
let currentUser = null;

let audits = [];
let users = [];
let notifications = [];
let unsubListeners = [];

// ═══════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════
auth.onAuthStateChanged(async user => {
  if (user) {
    // Validate domain
    if (!user.email.endsWith(DOMAIN) && !user.email.includes('@')) {
      await auth.signOut();
      showAuthErr('Solo se permiten correos corporativos ' + DOMAIN);
      return;
    }
    currentUser = user;
    await loadUserData(user.uid);
    initApp();
  } else {
    currentUser = null;
    currentUserData = null;
    document.getElementById('authScreen').style.display='flex';
    document.getElementById('app').style.display='none';
    unsubAll();
  }
});

async function doLogin(){
  const email = document.getElementById('authEmail').value.trim();
  const pass = document.getElementById('authPass').value;
  if(!email || !pass){ showAuthErr('Completa todos los campos'); return; }
  // Optional domain check before attempt
  // if(!email.endsWith(DOMAIN)){ showAuthErr('Usa tu correo '+DOMAIN); return; }
  try{
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e){
    const msgs = {
      'auth/user-not-found': 'Usuario no encontrado',
      'auth/wrong-password': 'Contraseña incorrecta',
      'auth/invalid-email': 'Correo inválido',
      'auth/too-many-requests': 'Demasiados intentos. Intenta más tarde',
    };
    showAuthErr(msgs[e.code] || 'Error al ingresar: ' + e.message);
  }
}

async function doLogout(){
  unsubAll();
  await auth.signOut();
}

function showAuthErr(msg){
  const el = document.getElementById('authErr');
  el.textContent = msg;
  el.style.display = 'block';
}

async function loadUserData(uid){
  const snap = await db.collection('users').doc(uid).get();
  if(snap.exists){
    currentUserData = { uid, ...snap.data() };
  } else {
    // Create basic user if first login
    const email = currentUser.email;
    const name = email.split('@')[0].replace(/\./g,' ').replace(/\b\w/g,c=>c.toUpperCase());
    currentUserData = { uid, email, name, role: 'operador', createdAt: new Date() };
    await db.collection('users').doc(uid).set(currentUserData);
  }
}

// ═══════════════════════════════════════════════════
// APP INIT
// ═══════════════════════════════════════════════════
function initApp(){
  document.getElementById('authScreen').style.display='none';
  document.getElementById('app').style.display='block';

  buildNav();

}

function updateSidebar(){

function buildNav(){
  const role = currentUserData.role;

function navigateTo(page){
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const navEl = document.getElementById('nav-'+page);
  if(navEl) navEl.classList.add('active');
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  const titles = {kanban:'Tablero Kanban',formulario:'Nueva Auditoría',dashboard:'Dashboard 5S',usuarios:'Gestión de Usuarios'};
  document.getElementById('pageTitle').textContent = titles[page]||page;

}

// ═══════════════════════════════════════════════════
// REAL-TIME SUBSCRIPTIONS
// ═══════════════════════════════════════════════════
function subscribeData(){
  unsubAll();
  const role = currentUserData.role;
  let query = db.collection('audits').orderBy('createdAt','desc');
  if(role === 'supervisor') query = query.where('supervisorId','==',currentUser.uid);
  if(role === 'operador') query = query.where('auditorId','==',currentUser.uid);

  const u1 = query.onSnapshot(snap=>{
    audits = snap.docs.map(d=>({id:d.id,...d.data()}));
    checkLateDates();
    renderKanban();
    renderDashboard();
  });
  unsubListeners.push(u1);

  const u2 = db.collection('notifications')
    .where('recipientId','==',currentUser.uid)
    .orderBy('createdAt','desc').limit(30)
    .onSnapshot(snap=>{
      notifications = snap.docs.map(d=>({id:d.id,...d.data()}));
      renderNotifications();
    });
  unsubListeners.push(u2);

  if(role==='admin'||role==='supervisor'){
    db.collection('users').get().then(snap=>{
      users = snap.docs.map(d=>({id:d.id,...d.data()}));
    });
  }
}

function unsubAll(){ unsubListeners.forEach(u=>u&&u()); unsubListeners=[]; }

function checkLateDates(){
  const now = new Date();
  audits.forEach(async a=>{
    if(a.status==='closed') return;
    if(a.deadline && a.deadline.toDate && a.deadline.toDate() < now && a.status!=='late'){
      await db.collection('audits').doc(a.id).update({status:'late'});
    }
  });
}

// ═══════════════════════════════════════════════════
// KANBAN
// ═══════════════════════════════════════════════════
function renderKanban(){
  const el = document.getElementById('pageKanban');
  if(!el.classList.contains('active')) return;
  const role = currentUserData.role;

  const cols = [
    {key:'pending',label:'Pendiente',icon:'🟣'},
    {key:'inprog',label:'En curso',icon:'🟡'},
    {key:'closed',label:'Cerrada',icon:'🟢'},
    {key:'late',label:'Atrasada',icon:'🔴'},
  ];

  let filterHtml = `<div class="filter-row">
    <select onchange="renderKanban()" id="kFilter">
      <option value="">Todas las etapas</option>
      ${cols.map(c=>`<option value="${c.key}">${c.label}</option>`).join('')}
    </select>
    <input type="text" id="kSearch" placeholder="Buscar auditoría..." oninput="renderKanban()" style="min-width:200px">
  </div>`;

  const filterVal = document.getElementById('kFilter')?.value||'';
  const searchVal = (document.getElementById('kSearch')?.value||'').toLowerCase();

  let filtered = audits.filter(a=>{
    if(filterVal && a.status!==filterVal) return false;
    if(searchVal && !`${a.area||''} ${a.auditorName||''} ${a.supervisorName||''} ${a.id}`.toLowerCase().includes(searchVal)) return false;
    return true;
  });

  const kanbanCols = cols.map(col=>{
    const colAudits = filtered.filter(a=>a.status===col.key);
    const cards = colAudits.length ? colAudits.map(a=>{
      const isLate = a.status==='late';
      const dl = a.deadline ? (a.deadline.toDate ? a.deadline.toDate() : new Date(a.deadline)) : null;
      const dlStr = dl ? dl.toLocaleDateString('es-GT') : '—';
      const pct = calcProgress(a);
      return `<div class="kanban-card${isLate?' late-card':''}" onclick="openAuditModal('${a.id}')">
        <div class="kc-id">#${a.id.substring(0,8).toUpperCase()}</div>
        <div class="kc-area">📍 ${a.area||'Operaciones'}</div>
        <div class="kc-auditor">👤 ${a.auditorName||'—'}</div>
        ${role!=='operador'?`<div class="kc-auditor">👔 ${a.supervisorName||'—'}</div>`:''}
        <div class="progress-bar-wrap"><div class="progress-bar ${pct>=80?'good':pct>=50?'mid':'bad'}" style="width:${pct}%"></div></div>
        <div class="kc-meta" style="margin-top:6px">
          <span style="font-size:10px;color:var(--muted)">Avance: ${pct}%</span>
          <span class="kc-date">📅 ${dlStr}</span>
        </div>
      </div>`;
    }).join('') : '<div class="kanban-empty">Sin auditorías</div>';

    return `<div class="kanban-col" data-col="${col.key}">
      <div class="kanban-col-header">
        <span>${col.icon} ${col.label}</span>
        <span class="count">${colAudits.length}</span>
      </div>
      <div class="kanban-items">${cards}</div>
    </div>`;
  }).join('');

  const kpisHtml = buildKPICards();

  el.innerHTML = `
    ${kpisHtml}
    ${filterHtml}
    <div class="kanban-board">${kanbanCols}</div>
  `;
}

function buildKPICards(){
  const total = audits.length;
  const byStatus = s => audits.filter(a=>a.status===s).length;
  const pending=byStatus('pending'), inprog=byStatus('inprog'), closed=byStatus('closed'), late=byStatus('late');
  return `<div class="kpi-grid">
    <div class="kpi"><div class="lbl">Total</div><div class="val">${total}</div><div class="sub">Auditorías</div></div>
    <div class="kpi"><div class="lbl">Pendientes</div><div class="val" style="color:var(--pending)">${pending}</div><div class="sub">Sin iniciar</div></div>
    <div class="kpi"><div class="lbl">En curso</div><div class="val" style="color:var(--inprog)">${inprog}</div><div class="sub">En seguimiento</div></div>
    <div class="kpi"><div class="lbl">Cerradas</div><div class="val" style="color:var(--good)">${closed}</div><div class="sub">Completadas</div></div>
    <div class="kpi"><div class="lbl">Atrasadas</div><div class="val" style="color:var(--bad)">${late}</div><div class="sub">Fuera de fecha</div></div>
  </div>`;
}

function calcProgress(audit){
  if(!audit.criterios) return 0;
  let total=0, done=0;
  CRITERIOS_5S.forEach((sec,si)=>{
    sec.items.forEach((_,ii)=>{
      total++;
      const key=`s${si}_i${ii}`;
      if(audit.criterios[key]==='si'||audit.criterios[key]==='no') done++;
    });
  });
  return total ? Math.round(done/total*100) : 0;
}

function renderCriteriosForm(){
  return CRITERIOS_5S.map((sec,si)=>`
    <div class="section-header"><span>${sec.s} — ${sec.nombre}</span></div>
    <table class="criteria-table" style="margin-bottom:20px">
      <thead><tr>
        <th class="criteria-num">#</th>
        <th>Criterio</th>

        <th class="evidencia-col">Evidencia</th>
      </tr></thead>
      <tbody>
        ${sec.items.map((item,ii)=>`
          <tr>
            <td class="criteria-num">${ii+1}</td>
            <td class="criteria-desc">${item}</td>
            <td>
              <div class="yn-group">
                <button class="yn-btn" id="yn-yes-${si}-${ii}" onclick="setYN(${si},${ii},'si')">✓ Sí</button>
                <button class="yn-btn" id="yn-no-${si}-${ii}" onclick="setYN(${si},${ii},'no')">✗ No</button>
              </div>
            </td>
            <td class="hallazgo-col">
              <textarea id="hallazgo-${si}-${ii}" placeholder="Describe el hallazgo..."></textarea>
            </td>
            <td class="evidencia-col">
              <div class="evidencia-upload">
                <label class="evidencia-label" for="ev-${si}-${ii}">📷 Subir foto</label>
                <input type="file" id="ev-${si}-${ii}" accept="image/*" multiple onchange="previewEvidence(${si},${ii},this)">
                <div class="evidencia-thumbs" id="thumbs-${si}-${ii}"></div>
              </div>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>

const ynState = {};
function setYN(si,ii,val){
  const key=`s${si}_i${ii}`;
  ynState[key]=val;
  document.getElementById(`yn-yes-${si}-${ii}`).className='yn-btn'+(val==='si'?' yes-active':'');
  document.getElementById(`yn-no-${si}-${ii}`).className='yn-btn'+(val==='no'?' no-active':'');
}

const evidenceFiles = {};
function previewEvidence(si,ii,input){
  const key=`s${si}_i${ii}`;
  if(!evidenceFiles[key]) evidenceFiles[key]=[];
  Array.from(input.files).forEach(f=>evidenceFiles[key].push(f));
  const thumbs = document.getElementById(`thumbs-${si}-${ii}`);
  thumbs.innerHTML='';
  evidenceFiles[key].forEach(f=>{
    const url=URL.createObjectURL(f);
    const img=document.createElement('img');
    img.src=url; img.title=f.name;
    thumbs.appendChild(img);
  });
}

async function loadSupervisors(){
  const snap = await db.collection('users').where('role','==','supervisor').get();
  users = snap.docs.map(d=>({id:d.id,...d.data()}));
  const sel = document.getElementById('fSupervisor');
  if(!sel) return;
  sel.innerHTML = users.length
    ? users.map(u=>`<option value="${u.id}">${u.name||u.email}</option>`).join('')
    : '<option value="">Sin supervisores disponibles</option>';
}

async function submitFormulario(){
  const area = document.getElementById('fArea')?.value || 'Operaciones';
  const deadline = document.getElementById('fDeadline')?.value;
  const supervisorId = document.getElementById('fSupervisor')?.value;
  const obs = document.getElementById('fObs')?.value||'';

  if(!deadline){ showToast('Selecciona una fecha límite','error'); return; }
  if(!supervisorId){ showToast('Selecciona un supervisor','error'); return; }

  const sup = users.find(u=>u.id===supervisorId);
  const criterios = {};
  const hallazgos = {};

  CRITERIOS_5S.forEach((sec,si)=>{
    sec.items.forEach((_,ii)=>{
      const key=`s${si}_i${ii}`;
      criterios[key] = ynState[key]||null;
      hallazgos[key] = document.getElementById(`hallazgo-${si}-${ii}`)?.value||'';
    });
  });

  showToast('Guardando auditoría...','');

  try {
    const docRef = await db.collection('audits').add({
      area, obs, criterios, hallazgos,
      status: 'pending',
      auditorId: currentUser.uid,
      auditorName: currentUserData.name||currentUserData.email,
      supervisorId,
      supervisorName: sup?.name||sup?.email||'—',
      deadline: new Date(deadline+'T23:59:59'),
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });

    // Upload evidence images
    const uploadTasks=[];
    for(const [key,files] of Object.entries(evidenceFiles)){
      for(const file of files){
        const path=`audits/${docRef.id}/auditor/${key}_${Date.now()}_${file.name}`;
        uploadTasks.push(storage.ref(path).put(file).then(async snap=>{
          const url=await snap.ref.getDownloadURL();
          await db.collection('audits').doc(docRef.id).update({
            [`evidencias_auditor.${key}`]: firebase.firestore.FieldValue.arrayUnion(url)
          });
        }));
      }
    }
    await Promise.all(uploadTasks);

    // Notify supervisor
    await createNotification(supervisorId, {
      title: 'Nueva auditoría asignada',
      body: `${currentUserData.name||currentUserData.email} te asignó una auditoría 5S de ${area}`,
      auditId: docRef.id,
      type: 'assignment'
    });

    showToast('✅ Auditoría enviada correctamente','success');
    // Reset
    Object.keys(ynState).forEach(k=>delete ynState[k]);
    Object.keys(evidenceFiles).forEach(k=>delete evidenceFiles[k]);
    renderFormulario();
  } catch(e){
    showToast('Error: '+e.message,'error');
  }
}

async function openAuditModal(auditId){
  const audit = audits.find(a=>a.id===auditId);
  if(!audit){ showToast('Auditoría no encontrada','error'); return; }
  currentAudit = audit;

  const role = currentUserData.role;
  const dl = audit.deadline ? (audit.deadline.toDate ? audit.deadline.toDate() : new Date(audit.deadline)) : null;
  const dlStr = dl ? dl.toLocaleDateString('es-GT') : '—';

  document.getElementById('auditModalTitle').textContent = `Auditoría 5S — ${audit.area||'Operaciones'}`;
  document.getElementById('auditModalMeta').textContent =
    `👤 Auditor: ${audit.auditorName||'—'} · 👔 Supervisor: ${audit.supervisorName||'—'} · 📅 Fecha límite: ${dlStr}`;
  document.getElementById('auditModalStatus').innerHTML =
    `<span class="pill pill-${audit.status||'pending'}">${STATUS[audit.status]||'—'}</span>`;

  const isSupervisor = role==='supervisor' && audit.supervisorId===currentUser.uid;
  const isAdmin = role==='admin';
  const canSolve = isSupervisor || isAdmin;

  // Build body
  let body = `<div style="margin-bottom:20px">
    <strong>Observaciones:</strong> ${audit.obs||'—'}
  </div>`;

  body += CRITERIOS_5S.map((sec,si)=>{
    const rows = sec.items.map((item,ii)=>{
      const key=`s${si}_i${ii}`;
      const val = audit.criterios?.[key];
      const hallazgo = audit.hallazgos?.[key]||'—';
      const solucion = audit.soluciones?.[key]||'';
      const evAuditor = audit.evidencias_auditor?.[key]||[];
      const evSup = audit.evidencias_supervisor?.[key]||[];

      const ynDisp = val==='si'
        ? '<span class="pill pill-closed">✓ Sí</span>'
        : val==='no'
        ? '<span class="pill pill-late">✗ No</span>'
        : '<span class="pill" style="background:var(--soft)">—</span>';

      const evAuditorHtml = evAuditor.map(u=>`<img src="${u}" style="width:40px;height:40px;object-fit:cover;border-radius:6px;border:1px solid var(--border);cursor:pointer;margin:2px" onclick="window.open('${u}','_blank')">`).join('');

      let solCell='';
      let evSupCell='';
      if(canSolve){
        solCell=`<td class="solucion-col">
          <textarea id="sol-${si}-${ii}" placeholder="Describe la solución aplicada...">${solucion}</textarea>
        </td>
        <td class="evidencia-col">
          <div class="evidencia-upload">
            <label class="evidencia-label" for="sevid-${si}-${ii}">📷 Evidencia</label>
            <input type="file" id="sevid-${si}-${ii}" accept="image/*" multiple onchange="previewSupEvidence(${si},${ii},this)">
            <div class="evidencia-thumbs" id="sthumbs-${si}-${ii}">
              ${evSup.map(u=>`<img src="${u}" style="width:40px;height:40px;object-fit:cover;border-radius:6px;border:1px solid var(--border);cursor:pointer;margin:2px" onclick="window.open('${u}','_blank')">`).join('')}
            </div>
          </div>
        </td>`;
      } else {
        const sSol = solucion||'—';
        solCell=`<td style="font-size:12px">${sSol}</td>`;
        evSupCell=`<td>${evSup.map(u=>`<img src="${u}" style="width:40px;height:40px;object-fit:cover;border-radius:6px;border:1px solid var(--border);cursor:pointer" onclick="window.open('${u}','_blank')">`).join('')||'—'}</td>`;
      }

      return `<tr>
        <td class="criteria-num">${ii+1}</td>
        <td class="criteria-desc">${item}</td>
        <td>${ynDisp}</td>
        <td style="font-size:12px">${hallazgo}</td>
        <td class="evidencia-col"><div class="evidencia-thumbs">${evAuditorHtml||'—'}</div></td>
        ${solCell}
        ${!canSolve?evSupCell:''}
      </tr>`;
    }).join('');

    const sCount = sec.items.filter((_,ii)=>audit.criterios?.[`s${si}_i${ii}`]==='si').length;
    const pct = Math.round(sCount/sec.items.length*100);

    return `<div class="section-header">
        <span>${sec.s} — ${sec.nombre}</span>
        <span class="section-score">${sCount}/${sec.items.length} · ${pct}%</span>
      </div>
      <div style="overflow-x:auto;margin-bottom:20px">
      <table class="criteria-table">
        <thead><tr>
          <th>#</th><th>Criterio</th><th>¿Cumple?</th>
          <th>Detalle del hallazgo</th><th>Evidencia</th>
          ${canSolve?'<th>Detalle de la solución</th><th>Evidencia de la solución</th>':'<th>Solución aplicada</th><th>Evidencia solución</th>'}
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
  }).join('');

  document.getElementById('auditModalBody').innerHTML = body;

  // Footer
  let footer='';
  if(canSolve && audit.status!=='closed'){
    footer+=`<button class="btn" onclick="saveAuditProgress()">💾 Guardar progreso</button>
      <button class="btn btn-dark" onclick="closeAuditAction()">✅ Marcar como cerrada</button>`;
  }
  if(isAdmin){
    footer+=`<button class="btn btn-danger btn-sm" onclick="deleteAudit('${audit.id}')">🗑 Eliminar</button>`;
  }
  footer+=`<button class="btn btn-sm" onclick="closeAuditModal()">Cerrar</button>`;
  document.getElementById('auditModalFooter').innerHTML=footer;

  document.getElementById('auditModal').classList.add('open');
}

function previewSupEvidence(si,ii,input){
  const key=`s${si}_i${ii}`;
  if(!supEvidenceFiles[key]) supEvidenceFiles[key]=[];
  Array.from(input.files).forEach(f=>supEvidenceFiles[key].push(f));
  const thumbs = document.getElementById(`sthumbs-${si}-${ii}`);
  if(!thumbs) return;
  const existing = currentAudit.evidencias_supervisor?.[key]||[];
  thumbs.innerHTML = existing.map(u=>`<img src="${u}" style="width:40px;height:40px;object-fit:cover;border-radius:6px;border:1px solid var(--border);margin:2px">`).join('');
  supEvidenceFiles[key].forEach(f=>{
    const url=URL.createObjectURL(f);
    const img=document.createElement('img');
    img.src=url; img.style.cssText='width:40px;height:40px;object-fit:cover;border-radius:6px;border:1px solid var(--border);margin:2px';
    thumbs.appendChild(img);
  });
}

async function saveAuditProgress(){
  if(!currentAudit) return;
  const soluciones={};
  CRITERIOS_5S.forEach((sec,si)=>{
    sec.items.forEach((_,ii)=>{
      const key=`s${si}_i${ii}`;
      const el=document.getElementById(`sol-${si}-${ii}`);
      if(el) soluciones[key]=el.value||'';
    });
  });

  showToast('Guardando...','');
  try{
    // Upload supervisor evidence
    for(const [key,files] of Object.entries(supEvidenceFiles)){
      for(const file of files){
        const path=`audits/${currentAudit.id}/supervisor/${key}_${Date.now()}_${file.name}`;
        const snap=await storage.ref(path).put(file);
        const url=await snap.ref.getDownloadURL();
        await db.collection('audits').doc(currentAudit.id).update({
          [`evidencias_supervisor.${key}`]: firebase.firestore.FieldValue.arrayUnion(url)
        });
      }
    }

    await db.collection('audits').doc(currentAudit.id).update({
      soluciones,
      status: 'inprog',
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });

    // Notify auditor
    await createNotification(currentAudit.auditorId, {
      title: 'Avance en tu auditoría',
      body: `${currentUserData.name||currentUserData.email} actualizó la solución de tu auditoría #${currentAudit.id.substring(0,8).toUpperCase()}`,
      auditId: currentAudit.id,
      type: 'update'
    });

    // Clear
    Object.keys(supEvidenceFiles).forEach(k=>delete supEvidenceFiles[k]);
    showToast('✅ Progreso guardado','success');
    closeAuditModal();
  }catch(e){ showToast('Error: '+e.message,'error'); }
}

async function closeAuditAction(){
  if(!currentAudit) return;
  await saveAuditProgress();
  await db.collection('audits').doc(currentAudit.id).update({
    status: 'closed',
    closedAt: firebase.firestore.FieldValue.serverTimestamp(),
  });
  await createNotification(currentAudit.auditorId, {
    title: 'Auditoría cerrada',
    body: `Tu auditoría #${currentAudit.id.substring(0,8).toUpperCase()} fue cerrada por ${currentUserData.name||currentUserData.email}`,
    auditId: currentAudit.id,
    type: 'closed'
  });
  showToast('✅ Auditoría cerrada','success');
  closeAuditModal();
}

async function deleteAudit(auditId){
  if(!confirm('¿Eliminar esta auditoría?')) return;
  await db.collection('audits').doc(auditId).delete();
  showToast('Auditoría eliminada','');
  closeAuditModal();
}

function closeAuditModal(){
  document.getElementById('auditModal').classList.remove('open');
  currentAudit=null;
  Object.keys(supSolutions).forEach(k=>delete supSolutions[k]);
  Object.keys(supEvidenceFiles).forEach(k=>delete supEvidenceFiles[k]);
}

// DASHBOARD
// ═══════════════════════════════════════════════════
let dashCharts = {};
function renderDashboard(){
  const el = document.getElementById('pageDashboard');
  if(!el.classList.contains('active')) return;

  const closed = audits.filter(a=>a.status==='closed');
  const all = audits;

  // Per-S compliance
  const sStats = CRITERIOS_5S.map((sec,si)=>{
    let yes=0,no=0,total=0;
    all.forEach(a=>{
      sec.items.forEach((_,ii)=>{
        const v=a.criterios?.[`s${si}_i${ii}`];
        if(v==='si'){yes++;total++;}
        else if(v==='no'){no++;total++;}
      });
    });
    const pct=total?Math.round(yes/total*100):0;
    return {s:sec.s,nombre:sec.nombre,yes,no,total,pct};
  });

  const overallPct = sStats.length
    ? Math.round(sStats.reduce((a,b)=>a+b.pct,0)/sStats.length)
    : 0;

  el.innerHTML=`
    <div class="kpi-grid">
      <div class="kpi"><div class="lbl">Cumplimiento global</div>
        <div class="val" style="color:${overallPct>=80?'var(--good)':overallPct>=50?'var(--inprog)':'var(--bad)'}">${overallPct}%</div>
        <div class="sub">Promedio todas las S</div></div>
      <div class="kpi"><div class="lbl">Auditorías cerradas</div>
        <div class="val" style="color:var(--good)">${closed.length}</div>
        <div class="sub">de ${all.length} totales</div></div>
      <div class="kpi"><div class="lbl">Tasa de cierre</div>
        <div class="val">${all.length?Math.round(closed.length/all.length*100):0}%</div>
        <div class="sub">Eficiencia</div></div>
      <div class="kpi"><div class="lbl">Criterios evaluados</div>
        <div class="val">${sStats.reduce((a,b)=>a+b.total,0)}</div>
        <div class="sub">en total</div></div>
    </div>
    <div class="dash-grid">
      <div class="chart-card">
        <h3>Cumplimiento por S</h3>
        <div style="position:relative;width:100%;height:260px">
          <canvas id="chartS" role="img" aria-label="Cumplimiento por categoría 5S">Gráfico de barras de cumplimiento por S</canvas>
        </div>
      </div>
      <div class="chart-card">
        <h3>Estado de auditorías</h3>
        <div style="position:relative;width:100%;height:260px">
          <canvas id="chartStatus" role="img" aria-label="Distribución de estados de auditorías">Gráfico de dona de estados</canvas>
        </div>
      </div>
    </div>
    <div class="card">
      <h3 style="font-size:14px;font-weight:800;margin-bottom:16px">Detalle por categoría 5S</h3>
      ${sStats.map(s=>`
        <div style="margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <span style="font-size:13px;font-weight:700">${s.s} — ${s.nombre}</span>
            <span style="font-size:12px;font-weight:800;color:${s.pct>=80?'var(--good)':s.pct>=50?'var(--inprog)':'var(--bad)'}">${s.pct}%</span>
          </div>
          <div class="progress-bar-wrap">
            <div class="progress-bar ${s.pct>=80?'good':s.pct>=50?'mid':'bad'}" style="width:${s.pct}%"></div>
          </div>
          <div style="font-size:11px;color:var(--muted);margin-top:3px">✓ ${s.yes} cumple · ✗ ${s.no} no cumple · de ${s.total} evaluados</div>
        </div>
      `).join('')}
    </div>
  `;

  // Destroy old charts
  Object.values(dashCharts).forEach(c=>c&&c.destroy());
  dashCharts={};

  // Chart S
  const byS = document.getElementById('chartS');
  if(byS){
    dashCharts.s = new Chart(byS,{
      type:'bar',
      data:{
        labels: sStats.map(s=>s.s),
        datasets:[
          {label:'Cumple',data:sStats.map(s=>s.yes),backgroundColor:'#166534',borderSkipped:false},
          {label:'No cumple',data:sStats.map(s=>s.no),backgroundColor:'#991b1b',borderSkipped:false},
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true}}
      }
    });
  }

  // Chart Status
  const byStatus = {pending:0,inprog:0,closed:0,late:0};
  audits.forEach(a=>{ if(byStatus[a.status]!==undefined) byStatus[a.status]++; });
  const stEl = document.getElementById('chartStatus');
  if(stEl){
    dashCharts.status = new Chart(stEl,{
      type:'doughnut',
      data:{
        labels:['Pendiente','En curso','Cerrada','Atrasada'],
        datasets:[{
          data:[byStatus.pending,byStatus.inprog,byStatus.closed,byStatus.late],
          backgroundColor:['#7c3aed','#ca8a04','#166534','#991b1b'],
          hoverOffset:4
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'bottom',labels:{font:{size:12}}}}
      }
    });
  }
}

async function renderUsuarios(){
  const el = document.getElementById('pageUsuarios');
  if(currentUserData.role!=='admin'){ el.innerHTML='<div class="card"><p>Sin acceso</p></div>'; return; }

  el.innerHTML=`<div class="card"><div class="spinner"></div></div>`;

  const snap = await db.collection('users').get();
  const allUsers = snap.docs.map(d=>({id:d.id,...d.data()}));

  el.innerHTML=`
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3 style="font-size:15px;font-weight:800">Usuarios registrados</h3>
        <button class="btn btn-accent" onclick="openCreateUser()">+ Nuevo usuario</button>
      </div>
      <table class="users-table">
        <thead><tr><th>Nombre</th><th>Correo</th><th>Rol</th><th>Acción</th></tr></thead>
        <tbody>
          ${allUsers.map(u=>`
            <tr>
              <td><div style="display:flex;align-items:center;gap:8px">
                <div class="avatar" style="width:28px;height:28px;font-size:11px">${(u.name||u.email).substring(0,2).toUpperCase()}</div>
                ${u.name||'—'}
              </div></td>
              <td style="color:var(--muted)">${u.email}</td>
              <td><span class="pill ${u.role==='admin'?'pill-late':u.role==='supervisor'?'pill-inprog':'pill-pending'}">${ROLES[u.role]||u.role}</span></td>
              <td>
                <select onchange="changeRole('${u.id}',this.value)" style="font-size:12px;padding:4px 8px;border-radius:6px">
                  ${Object.entries(ROLES).map(([k,v])=>`<option value="${k}" ${u.role===k?'selected':''}>${v}</option>`).join('')}
                </select>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
    <div class="card" style="margin-top:16px" id="createUserSection" style="display:none">
      <h3 style="font-size:15px;font-weight:800;margin-bottom:16px">Crear nuevo usuario</h3>
      <div class="audit-header-grid">
        <div class="form-group"><label>Nombre completo</label><input type="text" id="nuName" placeholder="Juan García"></div>
        <div class="form-group"><label>Correo</label><input type="email" id="nuEmail" placeholder="juan@ferco.com.gt"></div>
        <div class="form-group"><label>Contraseña temporal</label><input type="password" id="nuPass" placeholder="Min. 6 caracteres"></div>
        <div class="form-group"><label>Rol</label>
          <select id="nuRole">
            <option value="operador">Operador</option>
            <option value="supervisor">Supervisor</option>
            <option value="admin">Administrador</option>
          </select>
        </div>
      </div>
      <button class="btn btn-dark" onclick="createUser()">Crear usuario</button>
    </div>
  `;
}

function openCreateUser(){
  const s=document.getElementById('createUserSection');
  if(s) s.style.display=s.style.display==='none'?'block':'none';
}

async function changeRole(uid, role){
  await db.collection('users').doc(uid).update({role});
  showToast('Rol actualizado','success');
}

async function createUser(){
  const name=document.getElementById('nuName')?.value.trim();
  const email=document.getElementById('nuEmail')?.value.trim();
  const pass=document.getElementById('nuPass')?.value;
  const role=document.getElementById('nuRole')?.value;
  if(!name||!email||!pass){ showToast('Completa todos los campos','error'); return; }

  try{
    // Create via secondary auth instance or Cloud Function recommended in production
    // For demo: admin creates via Firebase REST API
    const response = await fetch(
      `https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${FB_CONFIG.apiKey}`,
      {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email,password:pass,returnSecureToken:false})
      }
    );
    const data=await response.json();
    if(data.error){ showToast('Error: '+data.error.message,'error'); return; }
    // Store user data
    await db.collection('users').doc(data.localId).set({name,email,role,createdAt:new Date(),createdBy:currentUser.uid});
    showToast('✅ Usuario creado','success');
    renderUsuarios();
  }catch(e){ showToast('Error: '+e.message,'error'); }
}

// NOTIFICATIONS
// ═══════════════════════════════════════════════════
async function createNotification(recipientId, data){
  await db.collection('notifications').add({
    recipientId,
    ...data,
    read: false,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
  });
}

function renderNotifications(){
  const unread = notifications.filter(n=>!n.read).length;
  const badge = document.getElementById('notifBadge');
  if(badge){ badge.textContent=unread; badge.style.display=unread>0?'flex':'none'; }

  const navDot=document.getElementById('navNotifDot');
  if(navDot){ navDot.textContent=unread; navDot.style.display=unread>0?'flex':'none'; }

  const list = document.getElementById('notifList');
  if(!list) return;
  if(!notifications.length){
    list.innerHTML='<div class="empty-state"><p>Sin notificaciones</p></div>';
    return;
  }
  list.innerHTML=notifications.map(n=>{
    const t = n.createdAt?.toDate ? n.createdAt.toDate() : new Date();
    return `<div class="notif-item${n.read?'':' unread'}" onclick="markRead('${n.id}')">
      <div class="notif-title">${n.title||'Notificación'}</div>
      <div class="notif-body">${n.body||''}</div>
      <div class="notif-time">${t.toLocaleDateString('es-GT')} ${t.toLocaleTimeString('es-GT',{hour:'2-digit',minute:'2-digit'})}</div>
    </div>`;
  }).join('');
}

async function markRead(notifId){
  await db.collection('notifications').doc(notifId).update({read:true});
}

function toggleNotifPanel(){
  document.getElementById('notifPanel').classList.toggle('open');
  // Mark all read
  notifications.filter(n=>!n.read).forEach(n=>{
    db.collection('notifications').doc(n.id).update({read:true});
  });
}

// UTILS
// ═══════════════════════════════════════════════════
function showToast(msg, type=''){
  const wrap=document.getElementById('toastWrap');
  const t=document.createElement('div');
  t.className='toast'+(type?' '+type:'');
  t.textContent=msg;
  wrap.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

// Enter key in auth
document.getElementById('authPass')?.addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
document.getElementById('authEmail')?.addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('authPass')?.focus(); });

// Close modal on overlay click
document.getElementById('auditModal')?.addEventListener('click',e=>{
  if(e.target===document.getElementById('auditModal')) closeAuditModal();
});
